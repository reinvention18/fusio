<svg xmlns="http://www.w3.org/2000/svg" width="24" height="16" viewBox="0 0 24 16" style="image-rendering: pixelated;">
  <!-- This is a side-view pixel lobster like the original -->
  
  <!-- Tail (left side) - 3 fan segments -->
  <rect x="0" y="5" width="2" height="1" fill="#d42c2c"/>
  <rect x="0" y="7" width="2" height="1" fill="#d42c2c"/>
  <rect x="0" y="9" width="2" height="1" fill="#d42c2c"/>
  <rect x="2" y="6" width="2" height="3" fill="#e63a3a"/>
  
  <!-- Body segments (curved lobster body) -->
  <rect x="4" y="5" width="3" height="5" fill="#e63a3a"/>
  <rect x="7" y="4" width="3" height="6" fill="#ff4444"/>
  <rect x="10" y="4" width="3" height="6" fill="#ff4444"/>
  
  <!-- Body segment lines -->
  <rect x="5" y="5" width="1" height="5" fill="#c42020" fill-opacity="0.5"/>
  <rect x="8" y="4" width="1" height="6" fill="#c42020" fill-opacity="0.5"/>
  <rect x="11" y="4" width="1" height="6" fill="#c42020" fill-opacity="0.5"/>
  
  <!-- Head -->
  <rect x="13" y="3" width="4" height="7" fill="#ff4444"/>
  <rect x="17" y="4" width="2" height="5" fill="#ff5555"/>
  
  <!-- Big front claw (top) -->
  <rect x="17" y="1" width="3" height="3" fill="#e63a3a"/>
  <rect x="20" y="0" width="2" height="2" fill="#ff4444"/>
  <rect x="20" y="2" width="2" height="2" fill="#ff4444"/>
  <rect x="22" y="1" width="2" height="1" fill="#d42c2c"/>
  <rect x="22" y="2" width="2" height="1" fill="#d42c2c"/>
  
  <!-- Big front claw (bottom) -->
  <rect x="17" y="9" width="3" height="3" fill="#e63a3a"/>
  <rect x="20" y="9" width="2" height="2" fill="#ff4444"/>
  <rect x="20" y="11" width="2" height="2" fill="#ff4444"/>
  <rect x="22" y="10" width="2" height="1" fill="#d42c2c"/>
  <rect x="22" y="11" width="2" height="1" fill="#d42c2c"/>
  
  <!-- Eye -->
  <rect x="17" y="5" width="2" height="2" fill="#ffffff"/>
  <rect x="18" y="5" width="1" height="2" fill="#000000"/>
  
  <!-- Angry eyebrow -->
  <rect x="16" y="4" width="3" height="1" fill="#8b0000"/>
  
  <!-- Antennae -->
  <rect x="18" y="2" width="1" height="2" fill="#d42c2c"/>
  <rect x="19" y="1" width="1" height="1" fill="#d42c2c"/>
  
  <!-- Walking legs -->
  <rect x="6" y="10" width="1" height="3" fill="#cc3333"/>
  <rect x="9" y="10" width="1" height="4" fill="#cc3333"/>
  <rect x="12" y="10" width="1" height="4" fill="#cc3333"/>
  <rect x="15" y="10" width="1" height="3" fill="#cc3333"/>
</svg>